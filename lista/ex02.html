<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <fieldset>
        <legend>Conversor de Celsius para Fahrenheit</legend>
        <label for="celsius">Temperatura em C:</label>
        <input type="number" id="iCel" step="0.1" oninput="calcFah(this.value)">
        <p>Temperatura em F: <span id="resulFah" style="display: inline;"></span></p>
        

    </fieldset>
    <fieldset>
        <legend>Conversor de Fahrenheit para Celsius</legend>
        <label for="fahrenheit">Temperatura em F: </label>
        <input type="number" id="iFah" step="0.1" oninput="calCel(this.value)" >
        <p>Temperatura em C: <span id="resulCel"></span></p>
        
    </fieldset>

    <script>
        function calcFah(valorDigitado){

            const resulFah =  document.getElementById('resulFah');

            if(valorDigitado===""){
                resulFah.innerHTML = "";
                return;
            }
            var cel = document.getElementById('iCel').value;
            var fah;
            fah = (cel*9/5)+32

        

            
            resulFah.innerHTML = `${fah.toFixed(2)} Fº`;

        }

        function calCel(valorDigitado){
            const resulCel = document.getElementById('resulCel');

            if(valorDigitado===""){
                resulCel.innerHTML = "";
                return;
            }
            var fah = document.getElementById('iFah').value;
            var cel;

            cel = (fah - 32)* 5/9


            resulCel.innerHTML = `${cel.toFixed(2)} Cº`
        }
    </script>
</body>
</html>
