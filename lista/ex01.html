<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
</head>
<body>
    <fieldset>
        <label for="CPF">Informe seu CPF:</label>
        <input type="text" id="iCPF" minlength="11" maxlength="11">

        <button onclick="checkCPF()">Validar</button>

        <span id="result"></span>
    </fieldset>



    <script>
        function checkCPF(){
            const CPFinformado = document.getElementById('iCPF').value;

            var primD = CPFinformado[9];
            var segD  = CPFinformado[10];

            var calPrimD = 0;
            var calSegD  = 0;

            var cont = 10;

            for (i=0; i < 9; i++){
                calPrimD += CPFinformado[i]*cont;
                cont--;
            }

            calPrimD *= 10;
            var restoPD = calPrimD%11;
            if(restoPD === 10) restoPD = 0;
            cont = 11;

            for (i=0; i<10; i++){
                calSegD += CPFinformado[i]*cont;
                cont--;
            }

            calSegD *= 10;
            var restoSD = calSegD%11;
            if(restoSD === 10) restoSD = 0;
            

            const result = document.getElementById('result');
            result.innerHTML = "";

            if(restoPD != CPFinformado[9] || restoSD != CPFinformado[10]){
                result.innerHTML = `<p style="color: red;">INEXISTENTE</p>`
            }
            else{
                result.innerHTML = `<p style="color: green;">EXISTENTE</p>`
            }    
        }
    </script>
</body>
</html>
